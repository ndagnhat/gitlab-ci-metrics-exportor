apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gitlab-ci-metrics-exporter.fullname" . }}
  labels:
    {{- include "gitlab-ci-metrics-exporter.labels" . | nindent 4 }}
data:
  HOST: "0.0.0.0"
  PORT: "9252"
  METRICS_PATH: {{ .Values.config.metricsPath | quote }}
  BODY_LIMIT: {{ .Values.config.bodyLimit | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DEFAULT_METRICS: {{ .Values.config.defaultMetrics | quote }}
  {{- if .Values.persistence.enabled }}
  PERSISTENCE_INTERVAL_MS: {{ .Values.config.persistenceIntervalMs | quote }}
  {{- end }}
